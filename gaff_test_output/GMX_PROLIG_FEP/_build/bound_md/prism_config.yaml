water_model:
  name: tip3p
  index: 1
  custom_water_models:
    1:
      name: tip3p
      label: TIP3P
      description: TIP 3-point, recommended
    2:
      name: tip4p
      label: TIP4P
      description: TIP 4-point
    3:
      name: tip4pew
      label: TIP4P-Ew
      description: TIP 4-point optimized with Ewald, recommended
    4:
      name: tip5p
      label: TIP5P
      description: TIP 5-point (see https://gitlab.com/gromacs/gromacs/-/issues/1348
        for issues)
    5:
      name: spc
      label: SPC
      description: simple point charge
    6:
      name: spce
      label: SPC/E
      description: extended simple point charge
box:
  distance: 1.5
  shape: cubic
  center: true
simulation:
  temperature: 310
  pressure: 1.0
  pH: 7.0
  ligand_charge: 0
  production_time_ns: 500
  dt: 0.002
  equilibration_nvt_time_ps: 500
  equilibration_npt_time_ps: 500
ions:
  neutral: true
  concentration: 0.15
  positive_ion: NA
  negative_ion: CL
constraints:
  algorithm: lincs
  type: h-bonds
  lincs_iter: 1
  lincs_order: 4
energy_minimization:
  integrator: steep
  emtol: 200.0
  emstep: 0.01
  nsteps: 10000
output:
  trajectory_interval_ps: 500
  energy_interval_ps: 10
  log_interval_ps: 10
  compressed_trajectory: true
electrostatics:
  coulombtype: PME
  rcoulomb: 1.0
  pme_order: 4
  fourierspacing: 0.16
vdw:
  rvdw: 1.0
  dispcorr: EnerPres
temperature_coupling:
  tcoupl: V-rescale
  tc_grps:
  - Protein
  - Non-Protein
  tau_t:
  - 0.1
  - 0.1
pressure_coupling:
  pcoupl: C-rescale
  pcoupltype: isotropic
  tau_p: 1.0
  compressibility: 4.5e-05
ligand_forcefield:
  type: gaff
  charge: 0
